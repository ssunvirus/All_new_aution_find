from selenium import webdriver
from selenium.webdriver.common.by import By
from bs4 import BeautifulSoup
import time

driver = webdriver.Chrome()
driver.get("https://www.seoulauction.com/auction-list/results")
time.sleep(3) # 페이지 로딩 대기

# 필요한 경우 '결과보기' 버튼 클릭 이벤트 제어 가능
# 예: driver.find_element(By.XPATH, '...').click()

# 현재 로드된 페이지 소스 가져오기
html = driver.page_source
soup = BeautifulSoup(html, 'html.parser')

# 경매 리스트 아이템 추출 (실제 태그와 클래스명은 개발자 도구로 확인 필요)
auction_items = soup.select('.auction-item-class') 
for item in auction_items:
    title = item.select_one('.title').text.strip()
    print(title)

driver.quit()
